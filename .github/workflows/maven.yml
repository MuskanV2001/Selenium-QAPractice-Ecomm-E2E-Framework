name: Selenium QA Practie Ecommerce E2E Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    permissions: 
      contents: read
      checks: write
      issues: write

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Execute the tests
      run: mvn clean test -DProfile=e2e -Dheadless=true
    - name: Publish Test Reports
      if: always()
      uses: dorny/test-reporter@v1
      with:
        name: Test Reports
        path: target/surefire-reports/junitreports/TEST-*.xml
        reporter: java-junit
