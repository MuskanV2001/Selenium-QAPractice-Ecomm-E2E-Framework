name: Trigger Jenkins Job

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  trigger-jenkins:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Jenkins Job
        run: |
          curl -v -X POST \
            "${{ secrets.JENKINS_URL }}/job/Selenium-QAPractice-Ecomm-E2E-Framework/build" \
            --user "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_API_TOKEN }}"